name: 📋 작업 요청
description: 내부 작업, 리팩토링, 인프라 변경 등을 요청합니다
labels: ["type:task"]
body:
  - type: markdown
    attributes:
      value: |
        구체적인 작업 내용을 작성해 주세요.
        Codex 에이전트가 자동으로 분석을 시작합니다.

  - type: dropdown
    id: area
    attributes:
      label: 관련 영역
      description: 작업이 필요한 영역을 선택해 주세요.
      options:
        - API (apps/api)
        - 근로자 앱 (apps/worker)
        - 관리자 대시보드 (apps/admin)
        - 공통 패키지 (packages/)
        - CI/CD / 인프라
        - 문서 / 기타
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - 낮음
        - 보통
        - 높음
        - 긴급
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 작업 내용
      description: 무엇을 해야 하는지 구체적으로 설명해 주세요.
      placeholder: |
        예:
        - ○○ 엔드포인트에 페이지네이션 추가
        - ○○ 컴포넌트를 공통 패키지로 이동
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 완료 기준 (선택)
      description: 이 작업이 완료되었다고 판단할 수 있는 기준이 있으면 적어 주세요.
      placeholder: |
        - [ ] 기준 1
        - [ ] 기준 2
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 참고 사항 (선택)
      description: 관련 파일, 이슈 번호, 또는 배경 정보가 있으면 적어 주세요.
    validations:
      required: false
