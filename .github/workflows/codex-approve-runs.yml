# Auto-approve CI workflow runs for Codex PRs
# GitHub requires manual approval for runs from first-time/external contributors.
# This workflow uses pull_request_target (always runs in base repo context,
# no approval needed) to approve pending runs on Codex PRs automatically.

name: Codex Approve Runs

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  actions: write

jobs:
  approve-runs:
    if: >-
      github.actor == 'Codex' ||
      startsWith(github.head_ref, 'codex/') ||
      contains(github.event.pull_request.labels.*.name, 'codex')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Approve pending workflow runs
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const sha = context.payload.pull_request.head.sha;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Retry loop — runs may take a few seconds to register
            for (let attempt = 0; attempt < 6; attempt++) {
              await new Promise(r => setTimeout(r, 10_000));

              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner, repo,
                head_sha: sha,
                status: 'action_required',
              });

              if (data.total_count === 0) {
                if (attempt < 3) {
                  core.info(`Attempt ${attempt + 1}: no pending runs yet, retrying…`);
                  continue;
                }
                core.info('No pending runs found — nothing to approve.');
                return;
              }

              for (const run of data.workflow_runs) {
                core.info(`Approving run ${run.id} (${run.name})`);
                try {
                  await github.rest.actions.approveWorkflowRun({
                    owner, repo,
                    run_id: run.id,
                  });
                } catch (e) {
                  core.warning(`Failed to approve run ${run.id}: ${e.message}`);
                }
              }

              core.info(`Approved ${data.total_count} run(s) for SHA ${sha}`);
              return;
            }

            core.info('Timed out waiting for pending runs.');
